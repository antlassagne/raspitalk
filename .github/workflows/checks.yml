name: CI checks
permissions:
  contents: read
on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  check-with-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  build-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install makeself
        run: sudo apt-get update -qq && sudo apt-get install -y makeself
      - name: Build installer
        run: ./build_installer.sh
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: raspitalk-installer
          path: raspitalk-installer.run
