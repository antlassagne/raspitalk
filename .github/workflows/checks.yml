name: CI checks
permissions:
  contents: read
on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

